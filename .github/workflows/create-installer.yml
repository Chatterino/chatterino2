name: Create installer

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    # make sure this only runs on the default branch
    branches:
      - master
      - "bugfix-release/*"
      - "release/*"
  workflow_dispatch:

jobs:
  create-installer:
    runs-on: windows-latest
    # Only run manually or when a build succeeds
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        qt-version: ["6.7.1"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # allows for tags access

      - name: Download artifact from triggering Build workflow
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v8
        with:
          name: chatterino-windows-x86-64-Qt-${{ matrix.qt-version }}.zip
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          path: build/

      - name: Find Build workflow run
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: find-build-run
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const { owner, repo } = context.repo;

            // Manual runs do not have a triggering workflow_run payload.
            // Match the previous commit-based artifact lookup behavior.
            const response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "build.yml",
              head_sha: context.sha,
              status: "success",
              per_page: 1,
            });

            const run = response.data.workflow_runs[0];

            if (!run) {
              core.setFailed(`No successful Build workflow run found for commit ${context.sha}.`);
              return "";
            }

            return String(run.id);

      - name: Download artifact from resolved Build workflow
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@v8
        with:
          name: chatterino-windows-x86-64-Qt-${{ matrix.qt-version }}.zip
          github-token: ${{ github.token }}
          run-id: ${{ steps.find-build-run.outputs.result }}
          path: build/

      - name: Unzip
        run: 7z e -spf chatterino-windows-x86-64-Qt-${{ matrix.qt-version }}.zip
        working-directory: build

      - name: Install InnoSetup
        run: choco install innosetup

      - name: Add InnoSetup to path
        run: echo "C:\Program Files (x86)\Inno Setup 6\" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Build installer
        id: build-installer
        working-directory: build
        run: ..\.CI\build-installer.ps1
        shell: powershell

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          path: build/${{ steps.build-installer.outputs.C2_INSTALLER_BASE_NAME }}.exe
          name: ${{ steps.build-installer.outputs.C2_INSTALLER_BASE_NAME }}.exe
